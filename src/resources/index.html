<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ProjectOn Server</title>
</head>
<style>
    #header {
        width: 100%;
        padding: 20px 40px;
        margin-bottom: 20px;
        background-color: #aaaaff;
        color: white;
        font-size: 4vh;
        font-family: 'Helvetica', sans-serif;
    }

    p {
        font-family: 'Helvetica', sans-serif;
        font-size: 3vh;
    }

    button {
        font-family: 'Helvetica', sans-serif;
        font-size: 3vh;
        background: white;
        border: 2px solid #aaaaff;
        padding: 10px 5px;
        border-radius: 5px;
    }
    button:hover {
        background: #a0a0a2;
    }
    button:active {
        background: #aaaaff;
    }
</style>
<body>
    <h1 id="header">
        ProjectOn Web Pages
    </h1>
    <p>
        Select the desired page:
    </p>
    <p>
        <button onclick="window.location.href='stage';">Stage View</button>
    </p>
    <p>
        <button onclick="window.location.href='remote';">Remote Control</button>
    </p>
    <p>
        <button onclick="window.location.href='mremote';">Mobile-Friendly Remote Control</button>
    </p>
</body>
</html>
